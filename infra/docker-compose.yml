services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wr3
      POSTGRES_USER: wr3
      POSTGRES_PASSWORD: wr3_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
